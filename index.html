<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>IRON VOLLEY</title>
<style>
  /* self-hosted fonts (offline, no CDN) */
  @font-face{font-family:'Black Ops One';src:url('assets/fonts/BlackOpsOne-Regular.ttf') format('truetype');font-weight:400;font-style:normal;font-display:swap;}
  @font-face{font-family:'Rajdhani';src:url('assets/fonts/Rajdhani-Regular.ttf') format('truetype');font-weight:400 500;font-style:normal;font-display:swap;}
  @font-face{font-family:'Rajdhani';src:url('assets/fonts/Rajdhani-SemiBold.ttf') format('truetype');font-weight:600;font-style:normal;font-display:swap;}
  @font-face{font-family:'Rajdhani';src:url('assets/fonts/Rajdhani-Bold.ttf') format('truetype');font-weight:700;font-style:normal;font-display:swap;}
  :root {
    --amber: #ffb347;
    --amber-hot: #ffd27a;
    --steel: #aebdca;
    --bg: #07090c;
    --danger: #ff4d4d;
    --ok: #6dff8a;
    --font-display: "Black Ops One", "Segoe UI", system-ui, sans-serif;
    --font-ui: "Rajdhani", "Segoe UI", system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
  body { font-family: var(--font-ui); color: #e8eef4; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  /* ── overlay layers ─────────────────────────────────────── */
  .layer { position: fixed; inset: 0; pointer-events: none; }
  .layer.interactive { pointer-events: auto; }

  /* split divider */
  #divider {
    position: fixed; left: 50%; top: 0; bottom: 0; width: 4px;
    transform: translateX(-2px);
    background: linear-gradient(#000, #2a3340 30%, #2a3340 70%, #000);
    box-shadow: 0 0 12px #000;
    display: none; z-index: 5;
  }

  /* ── menu chrome ────────────────────────────────────────── */
  #menu {
    display: flex; align-items: center; justify-content: center;
    /* Pad the viewport edges and allow the centred panel to scroll instead of
       clipping when a screen is taller than the window (the body itself is
       overflow:hidden, so without this the bottom buttons fell off-screen). */
    padding: 24px 16px;
    /* translucent so the live battle diorama shows behind the panel */
    background:
      radial-gradient(1100px 640px at 50% 8%, rgba(4,6,9,0) 34%, rgba(4,6,9,.62) 100%),
      linear-gradient(180deg, rgba(4,6,9,.42), rgba(4,6,9,0) 26%, rgba(4,6,9,.0) 64%, rgba(4,6,9,.66));
    z-index: 20;
  }
  .panel {
    width: min(860px, 92vw);
    /* Never exceed the viewport — cap to the padded window height and scroll
       internally. dvh tracks mobile browser chrome so nothing hides under it. */
    max-height: calc(100dvh - 48px);
    overflow-y: auto;
    overflow-x: hidden;
    text-align: center;
    padding: 36px 44px 44px;
    background: linear-gradient(180deg, rgba(16,21,29,.92), rgba(10,13,18,.95));
    border: 1px solid #232c38;
    border-radius: 18px;
    box-shadow: 0 30px 80px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.04);
    backdrop-filter: blur(6px);
  }
  @media (max-width: 560px) {
    .panel { padding: 22px 18px 26px; }
    .choices { gap: 10px; }
  }
  .logo {
    font-family: var(--font-display);
    font-size: clamp(44px, 8vw, 84px);
    font-weight: 400;
    letter-spacing: .04em;
    line-height: .95;
    background: linear-gradient(180deg, #fff 0%, var(--amber-hot) 38%, var(--amber) 55%, #8a4a12 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 4px 18px rgba(255,140,40,.35));
    text-transform: uppercase;
  }
  .tagline { margin-top: 6px; color: #8fa1b3; letter-spacing: .35em; font-size: 12px; text-transform: uppercase; }
  .menu-section { margin-top: 28px; }
  .menu-title { font-size: 12px; letter-spacing: .3em; color: #76879a; text-transform: uppercase; margin-bottom: 14px; }
  .choices { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  /* vertical menu stack (title screen) */
  .choices.vstack { flex-direction: column; align-items: stretch; flex-wrap: nowrap; max-width: 440px; margin: 0 auto; }
  .choices.vstack .choice { text-align: left; padding: 16px 22px; }
  /* controls reference table */
  .ctrl { margin: 6px auto 0; border-collapse: collapse; }
  .ctrl td, .ctrl th { padding: 7px 22px; border-bottom: 1px solid #232c38; font-size: 13px; text-align: left; }
  .ctrl th { font-size: 10px; letter-spacing: .22em; color: #76879a; text-transform: uppercase; }
  .ctrl td:first-child { color: #9fb0c2; }
  .ctrl td:not(:first-child) { color: #e8eef4; font-weight: 600; }
  .choice {
    min-width: 150px;
    padding: 14px 18px;
    border: 1px solid #2a3645;
    border-radius: 12px;
    background: linear-gradient(180deg, #141b25, #0d1219);
    color: #cfdae6;
    cursor: pointer;
    transition: transform .12s ease, border-color .12s, box-shadow .12s;
    user-select: none;
  }
  .choice .big { font-size: 17px; font-weight: 700; }
  .choice .sub { font-size: 11px; color: #7c8da0; margin-top: 4px; letter-spacing: .04em; }
  .choice:hover {
    transform: translateY(-2px);
    border-color: var(--amber);
    box-shadow: 0 6px 24px rgba(255,150,50,.18), inset 0 0 0 1px rgba(255,170,80,.25);
  }
  /* Gamepad / keyboard selection cursor. Deliberately much louder than :hover
     so it's always obvious which item the controller is on — a bright ring,
     a glow, and a pulse. Applies to menu cards, buttons and sliders alike,
     since the cursor can land on any of them. */
  .choice.focus, .btn.focus, input[type="range"].focus {
    outline: 3px solid var(--amber-hot);
    outline-offset: 3px;
    border-color: var(--amber-hot);
    box-shadow: 0 0 0 2px rgba(255,210,122,.55), 0 10px 34px rgba(255,150,50,.5);
    animation: focusPulse 1.1s ease-in-out infinite;
  }
  .choice.focus { transform: translateY(-2px) scale(1.02); }
  .btn.focus { transform: translateY(-2px) scale(1.03); }
  @keyframes focusPulse {
    0%, 100% { outline-color: var(--amber-hot); }
    50%      { outline-color: var(--amber); }
  }
  @media (prefers-reduced-motion: reduce) {
    .choice.focus, .btn.focus, input[type="range"].focus { animation: none; }
  }
  .choice.selected {
    border-color: var(--amber);
    background: linear-gradient(180deg, #2a2014, #161009);
    box-shadow: inset 0 0 18px rgba(255,150,50,.15), 0 0 0 1px rgba(255,170,80,.35);
  }
  .choice.disabled { opacity: .35; pointer-events: none; }
  .choice img.thumb {
    display: block; width: 100%; height: 110px; object-fit: cover;
    border-radius: 8px; margin-bottom: 10px;
    border: 1px solid #2a3645;
    background: #0a0e14;
  }
  input[type="range"] {
    accent-color: var(--amber);
    cursor: pointer;
  }
  .row-actions { margin-top: 30px; display: flex; gap: 14px; justify-content: center; }
  .btn {
    font-family: var(--font-ui);
    padding: 14px 38px;
    font-size: 16px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase;
    color: #1a0e02;
    background: linear-gradient(180deg, var(--amber-hot), var(--amber) 60%, #d98324);
    border: none; border-radius: 12px; cursor: pointer;
    box-shadow: 0 8px 26px rgba(255,150,50,.35), inset 0 1px 0 rgba(255,255,255,.5);
    transition: transform .12s, filter .12s;
  }
  .btn:hover { transform: translateY(-2px); filter: brightness(1.08); }
  .btn.ghost {
    color: #cfdae6; background: transparent;
    border: 1px solid #2a3645; box-shadow: none;
  }
  .hint { margin-top: 22px; font-size: 11px; color: #5d6e80; letter-spacing: .08em; }
  kbd {
    background: #1a2230; border: 1px solid #2e3a4a; border-bottom-width: 3px;
    border-radius: 5px; padding: 1px 7px; font-family: inherit; font-size: 10px; color: #aebdca;
  }

  /* ── TITLE SCREEN (scoped) ──────────────────────────────────
     A polished war-room front-end. Everything here lives inside
     .title-screen so the other menu panels keep their existing look.
     All accents are CSS-only and pointer-events:none so they never
     interfere with the clickable .choice cards underneath. */
  .panel.title-screen {
    position: relative;
    overflow: hidden;
    padding: 0;
    border-color: #2a3850;
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(255,150,50,.10), rgba(8,11,16,0) 55%),
      linear-gradient(180deg, rgba(14,19,27,.96), rgba(8,11,16,.97));
  }
  .title-screen .ts-bg { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  /* tactical grid that slowly drifts upward */
  .title-screen .ts-grid {
    position: absolute; inset: -40% -10% -10%;
    background-image:
      linear-gradient(rgba(120,160,200,.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(120,160,200,.07) 1px, transparent 1px);
    background-size: 46px 46px;
    transform: perspective(520px) rotateX(58deg);
    transform-origin: 50% 100%;
    mask-image: linear-gradient(180deg, transparent, #000 40%, #000 75%, transparent);
    -webkit-mask-image: linear-gradient(180deg, transparent, #000 40%, #000 75%, transparent);
    animation: tsGridScroll 9s linear infinite;
  }
  @keyframes tsGridScroll { to { background-position: 0 46px, 0 0; } }
  /* radar-style sweep behind the logo */
  .title-screen .ts-sweep {
    position: absolute; left: 50%; top: -30%;
    width: 150%; aspect-ratio: 1; transform: translateX(-50%);
    background: conic-gradient(from 0deg, rgba(255,170,80,.10), rgba(255,170,80,0) 22%, rgba(255,170,80,0) 100%);
    border-radius: 50%;
    animation: tsSweep 7s linear infinite;
    opacity: .7;
  }
  @keyframes tsSweep { to { transform: translateX(-50%) rotate(360deg); } }
  /* drifting hazard scanlines */
  .title-screen .ts-scan {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(180deg, rgba(255,255,255,.025) 0 1px, transparent 1px 4px);
    mix-blend-mode: overlay; opacity: .5;
    animation: tsScan 6s linear infinite;
  }
  @keyframes tsScan { to { background-position: 0 120px; } }
  /* corner targeting brackets */
  .title-screen .ts-bracket {
    position: absolute; width: 30px; height: 30px;
    border: 2px solid rgba(255,179,71,.45);
  }
  .title-screen .ts-bracket.tl { top: 16px; left: 16px; border-right: 0; border-bottom: 0; }
  .title-screen .ts-bracket.tr { top: 16px; right: 16px; border-left: 0; border-bottom: 0; }
  .title-screen .ts-bracket.bl { bottom: 16px; left: 16px; border-right: 0; border-top: 0; }
  .title-screen .ts-bracket.br { bottom: 16px; right: 16px; border-left: 0; border-top: 0; }

  .title-screen .ts-inner { position: relative; z-index: 1; padding: 48px 44px 30px; }

  /* status strip above the logo */
  .ts-status {
    display: inline-flex; align-items: center; gap: 9px;
    font-size: 11px; letter-spacing: .34em; text-transform: uppercase;
    color: #8fa9c4; padding: 5px 16px; margin-bottom: 18px;
    border: 1px solid rgba(120,160,200,.28); border-radius: 999px;
    background: rgba(10,16,24,.55);
  }
  .ts-status .dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--ok);
    box-shadow: 0 0 10px var(--ok); animation: tsBlink 1.8s ease-in-out infinite;
  }
  @keyframes tsBlink { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

  /* the logo: Black Ops One, layered glow + faint power flicker */
  .ts-logo {
    font-family: var(--font-display);
    font-size: clamp(52px, 10vw, 104px);
    line-height: .92; letter-spacing: .02em; text-transform: uppercase;
    background: linear-gradient(180deg, #fff 0%, var(--amber-hot) 40%, var(--amber) 58%, #7c3f0f 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 3px 0 rgba(0,0,0,.5)) drop-shadow(0 6px 26px rgba(255,140,40,.42));
    animation: tsFlicker 6s steps(1) infinite;
  }
  @keyframes tsFlicker {
    0%, 92%, 100% { opacity: 1; }
    93% { opacity: .72; } 94% { opacity: 1; } 96% { opacity: .82; } 97% { opacity: 1; }
  }
  /* amber underline that sweeps left→right under the logo */
  .ts-rule {
    position: relative; height: 3px; width: min(420px, 80%); margin: 14px auto 0;
    background: linear-gradient(90deg, transparent, rgba(255,179,71,.25), transparent);
    overflow: hidden;
  }
  .ts-rule::after {
    content: ""; position: absolute; top: 0; left: -40%; height: 100%; width: 40%;
    background: linear-gradient(90deg, transparent, var(--amber-hot), transparent);
    box-shadow: 0 0 12px var(--amber-hot);
    animation: tsRule 3.4s ease-in-out infinite;
  }
  @keyframes tsRule { 0% { left: -40%; } 60%,100% { left: 100%; } }

  .ts-tag {
    margin-top: 16px; color: #93a6ba; font-size: 13px; letter-spacing: .28em;
    text-transform: uppercase; font-weight: 500;
  }

  /* vertical tactical menu */
  .title-screen .choices.vstack { gap: 12px; max-width: 460px; margin-top: 30px; }
  .title-screen .choice {
    position: relative;
    display: flex; align-items: center; gap: 16px;
    padding: 15px 20px 15px 18px;
    border: 1px solid #2c3a4c; border-left: 3px solid #3a4c63;
    border-radius: 10px;
    background: linear-gradient(90deg, rgba(20,27,38,.92), rgba(13,18,26,.92));
    overflow: hidden;
    transition: transform .14s ease, border-color .14s, box-shadow .14s, background .14s;
  }
  /* sweep highlight that crosses the card on hover/focus */
  .title-screen .choice::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,179,71,.10), transparent);
    transform: translateX(-110%); transition: transform .5s ease; pointer-events: none;
  }
  .title-screen .choice:hover::after,
  .title-screen .choice.focus::after { transform: translateX(110%); }
  .title-screen .choice .ts-ico {
    flex: 0 0 auto; width: 34px; height: 34px; display: grid; place-items: center;
    font-size: 18px; line-height: 1; border-radius: 8px;
    background: rgba(255,179,71,.08); border: 1px solid rgba(255,179,71,.22);
    filter: saturate(1.1);
  }
  .title-screen .choice .ts-body { flex: 1 1 auto; min-width: 0; }
  .title-screen .choice .big {
    font-family: var(--font-ui); font-weight: 700; font-size: 19px;
    letter-spacing: .12em; text-transform: uppercase; color: #eef4fb;
  }
  .title-screen .choice .sub {
    font-size: 12px; color: #8295a8; margin-top: 2px; letter-spacing: .03em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .title-screen .choice .ts-go {
    flex: 0 0 auto; color: #57718c; font-size: 18px; font-weight: 700;
    transform: translateX(-4px); opacity: 0; transition: opacity .14s, transform .14s, color .14s;
  }
  .title-screen .choice:hover, .title-screen .choice.focus {
    transform: translateX(4px);
    border-color: var(--amber); border-left-color: var(--amber-hot);
    background: linear-gradient(90deg, rgba(42,32,18,.92), rgba(18,15,11,.92));
    box-shadow: 0 6px 26px rgba(255,150,50,.20), inset 0 0 0 1px rgba(255,170,80,.14);
  }
  .title-screen .choice:hover .ts-go, .title-screen .choice.focus .ts-go {
    opacity: 1; transform: translateX(0); color: var(--amber-hot);
  }
  .title-screen .choice:hover .ts-ico, .title-screen .choice.focus .ts-ico {
    background: rgba(255,179,71,.16); border-color: rgba(255,179,71,.5);
  }
  /* footer credit / build line */
  .ts-foot {
    margin-top: 26px; padding-top: 16px; border-top: 1px solid rgba(120,160,200,.14);
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
    font-size: 11px; letter-spacing: .14em; color: #5d6e80; text-transform: uppercase;
  }
  .ts-foot a { color: #8295a8; text-decoration: none; pointer-events: auto; }
  .ts-foot a:hover { color: var(--amber-hot); }
  @media (max-width: 560px) {
    .title-screen .ts-inner { padding: 34px 20px 22px; }
    .ts-foot { flex-direction: column; gap: 6px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .title-screen .ts-grid, .title-screen .ts-sweep, .title-screen .ts-scan,
    .ts-logo, .ts-rule::after, .ts-status .dot { animation: none; }
    .title-screen .choice::after { display: none; }
  }

  /* ── HUD ────────────────────────────────────────────────── */
  .hud { position: absolute; inset: 0; pointer-events: none; z-index: 4; display: none; }
  .hud .corner { position: absolute; }
  .hpwrap { width: 220px; }
  .label { font-size: 10px; letter-spacing: .25em; color: #9fb0c2; text-transform: uppercase; text-shadow: 0 1px 3px #000; }
  .bar {
    height: 14px; margin-top: 4px; border-radius: 7px; overflow: hidden;
    background: rgba(8,12,18,.7); border: 1px solid rgba(170,190,210,.25);
    box-shadow: 0 2px 8px rgba(0,0,0,.5);
  }
  .bar > i {
    display: block; height: 100%; width: 100%;
    background: linear-gradient(90deg, #57e389, #b7f06e);
    transition: width .15s ease, background .2s;
  }
  .bar.low > i { background: linear-gradient(90deg, #ff5e5e, #ffb02e); }
  .ammo { display: flex; gap: 10px; margin-top: 10px; }
  .slot {
    min-width: 86px; padding: 7px 10px; border-radius: 10px;
    background: rgba(8,12,18,.72); border: 1px solid rgba(170,190,210,.22);
    text-shadow: 0 1px 3px #000;
  }
  .slot .k { font-size: 9px; letter-spacing: .2em; color: #8fa1b3; text-transform: uppercase; }
  .slot .v { font-size: 16px; font-weight: 800; color: #f3f7fb; }
  .slot.special { border-color: rgba(255,180,80,.55); box-shadow: 0 0 14px rgba(255,150,50,.25); }
  .slot.special .v { color: var(--amber-hot); }
  .slot .cd { height: 3px; background: #2a3645; border-radius: 2px; margin-top: 5px; overflow: hidden; }
  .slot .cd > i { display: block; height: 100%; width: 0%; background: var(--amber); }
  .reticle {
    position: absolute; left: 50%; top: 50%; width: 26px; height: 26px;
    transform: translate(-50%, -50%);
    opacity: .9; filter: drop-shadow(0 1px 2px #000);
  }
  .killfeed { position: absolute; right: 16px; top: 14px; text-align: right; font-size: 12px; }
  .killfeed div {
    margin-top: 4px; padding: 4px 10px; border-radius: 8px;
    background: rgba(8,12,18,.65); border: 1px solid rgba(170,190,210,.15);
    animation: feedin .25s ease;
  }
  .killfeed b { color: var(--amber-hot); }
  @keyframes feedin { from { transform: translateX(20px); opacity: 0; } }
  .scorepill {
    position: absolute; left: 50%; top: 12px; transform: translateX(-50%);
    padding: 6px 18px; border-radius: 999px; font-weight: 800; font-size: 14px;
    background: rgba(8,12,18,.7); border: 1px solid rgba(170,190,210,.25);
    letter-spacing: .12em; text-shadow: 0 1px 3px #000;
  }
  .toast {
    position: absolute; left: 50%; top: 24%; transform: translateX(-50%);
    font-size: 22px; font-weight: 900; letter-spacing: .2em; text-transform: uppercase;
    color: var(--amber-hot); text-shadow: 0 0 18px rgba(255,150,50,.6), 0 2px 4px #000;
    opacity: 0; transition: opacity .2s;
  }
  .minimap {
    position: absolute; right: 16px; bottom: 14px;
    width: 170px; height: 170px; border-radius: 12px;
    background: rgba(8,14,12,.62);
    border: 1px solid rgba(120,170,140,.35);
    box-shadow: 0 4px 18px rgba(0,0,0,.5), inset 0 0 24px rgba(40,90,60,.18);
    overflow: hidden;
  }
  .minimap canvas { display: block; width: 170px; height: 170px; }
  .mm-label {
    position: absolute; left: 8px; top: 6px; font-size: 9px; letter-spacing: .28em;
    color: rgba(150,210,170,.7); text-transform: uppercase; text-shadow: 0 1px 2px #000;
  }
  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 58%, rgba(0,0,0,.42) 100%);
  }
  .dmgflash { position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 40%, rgba(255,30,30,.35)); opacity: 0; }

  /* end screen */
  #endscreen { display: none; align-items: center; justify-content: center; z-index: 30;
    background: rgba(4,6,9,.78); backdrop-filter: blur(4px); }
  .endtitle { font-family: var(--font-display); font-size: clamp(40px, 7vw, 72px); font-weight: 400; letter-spacing: .06em;
    background: linear-gradient(180deg, #fff, var(--amber)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .endsub { color: #9fb0c2; margin-top: 8px; letter-spacing: .2em; font-size: 13px; text-transform: uppercase; }
  .scores { margin: 26px auto 0; border-collapse: collapse; min-width: 380px; }
  .scores td, .scores th { padding: 8px 22px; border-bottom: 1px solid #232c38; font-size: 14px; }
  .scores th { font-size: 10px; letter-spacing: .25em; color: #76879a; text-transform: uppercase; }
  .scores .me { color: var(--amber-hot); font-weight: 800; }

  #fade { position: fixed; inset: 0; background: #000; opacity: 0; pointer-events: none; transition: opacity .4s ease; z-index: 50; }
</style>
<script src="assets/vendor/peerjs.min.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "./assets/vendor/three/three.module.js",
    "three/addons/": "./assets/vendor/three/addons/"
  }
}
</script>
</head>
<body>
  <div id="app"></div>
  <div id="divider"></div>

  <div id="hud1" class="hud"></div>
  <div id="hud2" class="hud"></div>

  <div id="menu" class="layer interactive"></div>
  <div id="endscreen" class="layer interactive"></div>
  <div id="fade"></div>

  <script type="module" src="./src/main.js"></script>
</body>
